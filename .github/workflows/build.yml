name: Build PiniX Executable

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install -r requirements.txt

    - name: Download and Extract mpv-2.dll
      shell: powershell
      run: |
        $DOWNLOAD_URL = (Invoke-RestMethod -Uri "https://api.github.com/repos/shinchiro/mpv-winbuild-cmake/releases/latest").assets | Where-Object { $_.name -match "mpv-dev-x86_64-v3" } | Select-Object -ExpandProperty browser_download_url
        Write-Host "Downloading mpv from $DOWNLOAD_URL"
        Invoke-WebRequest -Uri $DOWNLOAD_URL -OutFile "mpv-dev.7z"
        7z e mpv-dev.7z mpv-2.dll -r
    - name: Build with PyInstaller
      run: |
        pyinstaller pinix.spec

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: PiniX-Windows-Executable
        path: dist/PiniX/
