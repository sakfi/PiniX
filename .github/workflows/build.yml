name: Build PiniX Executable

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install -r requirements.txt

    - name: Download and Extract mpv-2.dll
      run: |
        # Download a pre-compiled Windows mpv dev build (7z format)
        curl -L -o mpv-dev.7z https://github.com/shinchiro/mpv-winbuild-cmake/releases/download/20230630/mpv-dev-x86_64-20230630-git-521af58.7z
        # Extract just the mpv-2.dll into the project root using 7z (available on windows-latest runner)
        7z e mpv-dev.7z mpv-2.dll -r
        
    - name: Build with PyInstaller
      run: |
        pyinstaller pinix.spec

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: PiniX-Windows-Executable
        path: dist/PiniX/
